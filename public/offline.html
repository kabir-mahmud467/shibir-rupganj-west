<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Rupganj West</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 10% 10%, #0f5132 0%, #03170d 45%, #021109 100%);
      color: #f6fff9;
      font-family: "Hind Siliguri", sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(6px);
    }
    a {
      display: inline-block;
      margin-top: 14px;
      color: #ffe37a;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>আপনি এখন অফলাইনে আছেন</h1>
    <p>ইন্টারনেট সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
    <a href="/">হোম পেজে ফিরে যান</a>
  </div>
</body>
</html>
